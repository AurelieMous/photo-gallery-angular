
<div class="mb-8">
  <div class="max-w-2xl mx-auto">
    <div class="relative">
      <!-- Input de recherche -->
      <input
        #searchInput
        type="text"
        [(ngModel)]="searchQuery"
        (keyup.enter)="onSearch()"
        placeholder="Rechercher des photos (nature, montagne, chat...)"
        class="w-full px-6 py-4 pl-14 pr-12 text-lg border-2 border-gray-300 rounded-full
               focus:outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-200
               transition-all duration-300 shadow-sm"
      />

      <!-- Icône de recherche -->
      <svg class="absolute left-5 top-1/2 -translate-y-1/2 w-6 h-6 text-gray-400"
           fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
      </svg>

      <!-- Bouton clear (visible seulement si du texte) -->
      @if (searchQuery) {
        <button
          (click)="clearSearch()"
          class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600
                 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      }
    </div>

    <!-- Suggestions populaires (optionnel) -->
    <div class="mt-4 flex flex-wrap gap-2 justify-center">
      @for (suggestion of suggestions; track suggestion) {
        <button
          (click)="searchSuggestion(suggestion)"
          class="px-4 py-1.5 bg-gray-100 hover:bg-blue-100 hover:text-blue-700
                 rounded-full text-sm font-medium transition-all duration-200
                 hover:shadow-md cursor-pointer">
          {{ suggestion }}
        </button>
      }
    </div>
  </div>
</div>
