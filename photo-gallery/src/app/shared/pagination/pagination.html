<div class="flex items-center justify-center gap-2 my-8">
  <!-- Bouton Précédent -->
  <button
    (click)="previousPage()"
    [disabled]="!hasPreviousPage"
    class="px-4 py-2 rounded-lg font-medium transition-all
           disabled:opacity-50 disabled:cursor-not-allowed
           bg-white border-2 border-gray-300 text-gray-700
           hover:bg-gray-50 hover:border-blue-500
           disabled:hover:bg-white disabled:hover:border-gray-300">
    <div class="flex items-center gap-2">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
      <span>Précédent</span>
    </div>
  </button>

  <!-- Numéros de pages -->
  <div class="hidden sm:flex items-center gap-2">
    @for (page of pageNumbers; track page; let i = $index) {
      <!-- Afficher "..." si il y a un saut -->
      @if (i > 0 && page - pageNumbers[i - 1] > 1) {
        <span class="px-3 py-2 text-gray-500">...</span>
      }

      <!-- Numéro de page -->
      <button
        (click)="goToPage(page)"
        [class.bg-blue-600]="page === currentPage()"
        [class.text-white]="page === currentPage()"
        [class.bg-white]="page !== currentPage()"
        [class.text-gray-700]="page !== currentPage()"
        class="px-4 py-2 rounded-lg font-medium border-2 transition-all
               hover:border-blue-500
               min-w-[44px]"
        [class.border-blue-600]="page === currentPage()"
        [class.border-gray-300]="page !== currentPage()">
        {{ page }}
      </button>
    }
  </div>

  <!-- Page actuelle (mobile) -->
  <div class="sm:hidden px-4 py-2 bg-gray-100 rounded-lg font-medium">
    Page {{ currentPage() }} / {{ totalPages }}
  </div>

  <!-- Bouton Suivant -->
  <button
    (click)="nextPage()"
    [disabled]="!hasNext"
    class="px-4 py-2 rounded-lg font-medium transition-all
           disabled:opacity-50 disabled:cursor-not-allowed
           bg-white border-2 border-gray-300 text-gray-700
           hover:bg-gray-50 hover:border-blue-500
           disabled:hover:bg-white disabled:hover:border-gray-300">
    <div class="flex items-center gap-2">
      <span>Suivant</span>
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
    </div>
  </button>
</div>
