<section class="container mx-auto px-4 py-8">
  <!-- Titre centré et stylisé -->
  <h1 class="text-5xl font-bold text-gray-800 text-center mb-10">
    Photo du moment
  </h1>

  @if (isLoading()) {
    <p class="text-center text-xl">Chargement...</p>
  } @else {
    <div class="max-w-7xl mx-auto">
      <div class="flex flex-wrap gap-6 justify-center">
        @for (photo of photos(); track photo.id) {
          <div class="w-full sm:w-1/2 md:w-1/3 lg:w-1/4 flex-shrink-0">
            <app-img-card [photo]="photo" />
          </div>
        }
      </div>
    </div>
  }

</section>
