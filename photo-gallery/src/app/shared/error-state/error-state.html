<div class="flex flex-col items-center justify-center py-12 px-4">
  <!-- Icône d'erreur -->
  <svg class="mx-auto h-24 w-24 text-red-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
  </svg>

  <!-- Titre -->
  <h3 class="text-2xl font-bold text-red-800 mb-2">
    {{ title() }}
  </h3>

  <!-- Message d'erreur -->
  <p class="text-gray-600 text-center mb-6 max-w-md">
    {{ message() }}
  </p>

  <!-- Bouton -->
  @if (buttonLink()) {
    <!-- Lien de navigation -->
    <a
      [routerLink]="buttonLink()"
      class="px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors font-medium inline-block">
      {{ buttonText() }}
    </a>
  } @else {
    <!-- Bouton retry -->
    <button
      (click)="onRetry()"
      class="px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors font-medium">
      {{ buttonText() }}
    </button>
  }
</div>
